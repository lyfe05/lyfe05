name: Update Elapsed Time

on:
  schedule:
    # Run every 10 minutes during matches
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: update-elapsed-time
  cancel-in-progress: false

jobs:
  update-elapsed-time:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      - name: Run elapsed time updater
        run: |
          python update_elapsed_time.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.txt
          git diff --staged --quiet || git commit -m "Update elapsed time [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
