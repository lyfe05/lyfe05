name: Fetch Matches

on:
  schedule:
    # Run every day at 02:30 GMT+3 (23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.31.0 beautifulsoup4==4.12.2 pytz==2025.7 rapidfuzz==2.8.0 cloudscraper==1.2.79

      - name: Run script and save output
        run: |
          # Force Nairobi time in the script
          python - << 'EOF' > matches.txt 2>&1
import os
os.environ['TZ'] = 'Africa/Nairobi'
import time
time.tzset()
exec(open("matches.py").read())
EOF

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.txt
          git commit -m "Update matches.txt [skip ci]" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
