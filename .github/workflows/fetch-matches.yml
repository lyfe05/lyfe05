name: Fetch Matches

on:
  schedule:
    # Run every day at 02:30 GMT+3 (which is 23:30 UTC)
    - cron: "30 23 * * *"
  workflow_dispatch:  # allow manual trigger

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz rapidfuzz

      - name: Run script and save output
        run: |
          python matches.py > matches.txt

      - name: Commit and push results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add matches.txt
          git commit -m "Update matches.txt [skip ci]" || echo "No changes to commit"
          git push
